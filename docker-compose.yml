services:
  bot:
    build: .
    container_name: bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mariadb
      - lavalink

  mariadb:
    image: mariadb:11.7.2
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
    ports:
      - "8080:80"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    user: "0:0"
    environment:
      _JAVA_OPTIONS: -Xmx512M
      SERVER_PORT: 2333
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD}
      PLUGINS_SPOTIFY_CLIENTID: ${SPOTIFY_CLIENT_ID}
      PLUGINS_SPOTIFY_CLIENTSECRET: ${SPOTIFY_CLIENT_SECRET}
      PLUGINS_APPLEMUSIC_MEDIAAPITOKEN: ${APPLE_MUSIC_TOKEN:-}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - lavalink_plugins:/opt/Lavalink/plugins
    expose:
      - 2333
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2333 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  lavalink_plugins:
